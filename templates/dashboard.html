<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Omni - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; }
        .console { background-color: black; border: 1px solid #1e293b; border-radius: 0.5rem; height: 400px; overflow-y: auto; padding: 1rem; font-family: monospace; }
        .user-msg { color: #3b82f6; }
        .ai-msg { color: #10b981; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500">Nexus Omni v{{ config.app.version }}</h1>
            <div id="status" class="text-sm bg-gray-800 px-3 py-1 rounded-full">Offline</div>
        </header>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-xs uppercase">CPU</h3>
                <p id="cpu-stat" class="text-xl font-bold">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-xs uppercase">RAM</h3>
                <p id="ram-stat" class="text-xl font-bold">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-xs uppercase">Storage</h3>
                <p id="storage-stat" class="text-xl font-bold">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-xs uppercase">Battery</h3>
                <p id="battery-stat" class="text-xl font-bold">--%</p>
            </div>
        </div>

        <div class="console mb-4" id="chat-console">
            <p class="text-gray-500 italic">Welcome to Nexus Omni. Systems are ready.</p>
        </div>

        <div class="flex gap-2">
            <input type="text" id="user-input" class="flex-1 bg-gray-800 border border-gray-700 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="Type a message or command...">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded font-bold transition">Send</button>
        </div>
    </div>

    <script>
        const socket = io();
        const consoleDiv = document.getElementById('chat-console');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        socket.on('connect', () => {
            document.getElementById('status').textContent = 'Online';
            document.getElementById('status').classList.replace('bg-gray-800', 'bg-green-900');
        });

        socket.on('telemetry', (data) => {
            document.getElementById('cpu-stat').textContent = data.cpu + '%';
            document.getElementById('ram-stat').textContent = data.ram + '%';
            document.getElementById('storage-stat').textContent = data.storage + '%';
            document.getElementById('battery-stat').textContent = data.battery.percentage + '%';
        });

        socket.on('ai_response', (data) => {
            addMessage('AI', data.response);
        });

        function addMessage(role, text) {
            const p = document.createElement('p');
            p.className = role === 'AI' ? 'ai-msg' : 'user-msg';
            p.textContent = `${role}> ${text}`;
            consoleDiv.appendChild(p);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage('You', msg);
            socket.emit('chat_message', { message: msg });
            userInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
