<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Omni - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; }
        .console { background-color: black; border: 1px solid #1e293b; border-radius: 0.5rem; height: 300px; overflow-y: auto; padding: 1rem; font-family: monospace; }
        .user-msg { color: #3b82f6; }
        .ai-msg { color: #10b981; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8" x-data="{ tab: 'chat' }">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-500">Nexus Omni v{{ config.app.version }}</h1>
            <div class="flex items-center gap-4">
                <div id="status" class="text-xs bg-green-900 px-3 py-1 rounded-full">Online</div>
                <a href="/logout" class="text-xs text-red-400 hover:underline">Logout</a>
            </div>
        </header>

        <!-- Stats Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-[10px] uppercase tracking-wider">CPU</h3>
                <p id="cpu-stat" class="text-xl font-bold text-blue-400">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-[10px] uppercase tracking-wider">RAM</h3>
                <p id="ram-stat" class="text-xl font-bold text-purple-400">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-[10px] uppercase tracking-wider">Storage</h3>
                <p id="storage-stat" class="text-xl font-bold text-yellow-400">--%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg">
                <h3 class="text-gray-400 text-[10px] uppercase tracking-wider">Battery</h3>
                <p id="battery-stat" class="text-xl font-bold text-green-400">--%</p>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-gray-700 mb-6 overflow-x-auto">
            <button @click="tab = 'chat'" :class="tab === 'chat' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Chat</button>
            <button @click="tab = 'todos'" :class="tab === 'todos' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Todos</button>
            <button @click="tab = 'notes'" :class="tab === 'notes' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Notes</button>
            <button @click="tab = 'tools'" :class="tab === 'tools' ? 'border-blue-500 text-blue-500' : 'border-transparent text-gray-400'" class="px-4 py-2 border-b-2 font-medium transition whitespace-nowrap">Tools</button>
        </div>

        <!-- Chat Tab -->
        <div x-show="tab === 'chat'">
            <div class="console mb-4 shadow-inner" id="chat-console">
                <p class="text-gray-500 italic">> Systems initialized. Welcome, commander.</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="user-input" class="flex-1 bg-gray-800 border border-gray-700 rounded p-3 focus:outline-none focus:border-blue-500 transition shadow-sm" placeholder="Ask anything...">
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-8 rounded font-bold transition shadow-lg">Send</button>
            </div>
        </div>

        <!-- Todos Tab -->
        <div x-show="tab === 'todos'" x-cloak x-data="{ todos: [], newTask: '' }" x-init="fetch('/api/todos').then(r => r.json()).then(d => todos = d.todos)">
            <div class="bg-gray-800 p-6 rounded-lg">
                <div class="flex gap-2 mb-6">
                    <input type="text" x-model="newTask" class="flex-1 bg-gray-700 border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500" placeholder="What needs to be done?">
                    <button @click="fetch('/api/todos', {method:'POST', body: JSON.stringify({task: newTask}), headers:{'Content-Type':'application/json'}}).then(() => { newTask=''; fetch('/api/todos').then(r=>r.json()).then(d=>todos=d.todos) })" class="bg-green-600 px-4 rounded font-bold">Add</button>
                </div>
                <ul class="space-y-2">
                    <template x-for="todo in todos" :key="todo.id">
                        <li class="flex items-center gap-2 p-2 bg-gray-700 rounded transition hover:bg-gray-600">
                            <input type="checkbox" :checked="todo.completed" class="w-4 h-4 text-blue-600 rounded border-gray-500 focus:ring-blue-500">
                            <span :class="todo.completed ? 'line-through text-gray-500' : ''" x-text="todo.task"></span>
                        </li>
                    </template>
                </ul>
            </div>
        </div>

        <!-- Notes Tab -->
        <div x-show="tab === 'notes'" x-cloak x-data="{ notes: [], showAdd: false, nTitle: '', nContent: '' }" x-init="fetch('/api/notes').then(r => r.json()).then(d => notes = d.notes)">
            <div class="mb-4">
                <button @click="showAdd = !showAdd" class="bg-blue-600 px-4 py-2 rounded font-bold" x-text="showAdd ? 'Cancel' : 'New Note'"></button>
            </div>
            <div x-show="showAdd" class="bg-gray-800 p-6 rounded-lg mb-6 shadow-xl">
                <input x-model="nTitle" class="w-full bg-gray-700 border border-gray-600 rounded p-2 mb-4" placeholder="Note Title">
                <textarea x-model="nContent" class="w-full bg-gray-700 border border-gray-600 rounded p-2 mb-4 h-32" placeholder="Start typing..."></textarea>
                <button @click="fetch('/api/notes', {method:'POST', body: JSON.stringify({title: nTitle, content: nContent}), headers:{'Content-Type':'application/json'}}).then(() => { nTitle=''; nContent=''; showAdd=false; fetch('/api/notes').then(r=>r.json()).then(d=>notes=d.notes) })" class="w-full bg-green-600 py-2 rounded font-bold">Save Note</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="note in notes" :key="note.id">
                    <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 hover:border-blue-500 transition">
                        <h4 class="font-bold text-blue-400 mb-2" x-text="note.title"></h4>
                        <p class="text-sm text-gray-300 line-clamp-3" x-text="note.content"></p>
                    </div>
                </template>
            </div>
        </div>

        <!-- Tools Tab -->
        <div x-show="tab === 'tools'" x-cloak>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gray-800 p-6 rounded-lg shadow-md" x-data="{ pass: '' }">
                    <h3 class="text-xl font-bold mb-4">Password Generator</h3>
                    <div class="bg-gray-900 p-3 rounded font-mono text-blue-300 mb-4 h-12 flex items-center justify-center break-all" x-text="pass || '----'"></div>
                    <button @click="fetch('/api/tools/password').then(r=>r.json()).then(d=>pass=d.password)" class="w-full bg-blue-600 py-2 rounded font-bold">Generate</button>
                </div>
                <div class="bg-gray-800 p-6 rounded-lg shadow-md">
                    <h3 class="text-xl font-bold mb-4">Sovereign Data</h3>
                    <p class="text-sm text-gray-400 mb-6">Nexus keeps all data local. You can export your entire database to a JSON file at any time.</p>
                    <a href="/api/system/export" target="_blank" class="block w-full bg-yellow-600 hover:bg-yellow-700 py-2 rounded font-bold text-center transition">Export Everything</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const consoleDiv = document.getElementById('chat-console');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        socket.on('telemetry', (data) => {
            document.getElementById('cpu-stat').textContent = data.cpu + '%';
            document.getElementById('ram-stat').textContent = data.ram + '%';
            document.getElementById('storage-stat').textContent = data.storage + '%';
            document.getElementById('battery-stat').textContent = data.battery.percentage + '%';
        });

        socket.on('ai_response', (data) => {
            addMessage('AI', data.response);
        });

        function addMessage(role, text) {
            const p = document.createElement('p');
            p.className = role === 'AI' ? 'ai-msg' : 'user-msg';
            p.textContent = `${role}> ${text}`;
            consoleDiv.appendChild(p);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function sendMessage() {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage('You', msg);
            socket.emit('chat_message', { message: msg });
            userInput.value = '';
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
