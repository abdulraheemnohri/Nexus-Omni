<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Omni - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-500">Nexus Omni v{{ config.app.version }}</h1>
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block mb-2">Security PIN</label>
                <input type="password" name="pin" class="w-full p-2 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500" required autofocus>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-2 rounded font-bold transition">Authorize</button>
        </form>
    </div>
</body>
</html>
